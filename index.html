<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="public/style.css">

</head>

<body>
    <h1>Cdastro de alunos</h1>

    <form id="formAluno">
        <input type="hidden" id="id">

        <input type="text" id="nome" placeholder="Nome aluno" required>
        <input type="text" id="curso" placeholder="curso" required>
        <input type="number" id="idade" placeholder="Idade" required>

        <button type="submit"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px"
                fill="#ffffff">
                <path d="M0 0h24v24H0z" fill="none" />
                <path
                    d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z" />
            </svg>Salvar
        </button>
    </form>


    <h2>Alunos cadastrados</h2>

    <table>
        <thead>
            <tr>
                <th>nome</th>
                <th>curso</th>
                <th>idade</th>
                <th>ações</th>
            </tr>
        </thead>

        <tbody id="listaAlunos"></tbody>
    </table>

    <script src="public/script.js"></script>

</body>

</html>
